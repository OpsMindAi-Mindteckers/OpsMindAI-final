<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpsMindAI — Sign In</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { margin-bottom: 20px; }
    .status { color: #86efac; margin: 10px 0; font-size: 14px; }
    .error { color: #fca5a5; }
    .token-box {
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      max-width: 700px;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      display: none;
    }
    button.action {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 14px;
    }
    .copy { background: #6366f1; }
    .signout { background: #ef4444; }
    .swagger { background: #22c55e; text-decoration: none; display: inline-block; }
  </style>
</head>
<body>
  <h1>OpsMindAI Login</h1>
  <div id="app"></div>
  <div id="statusMsg" class="status"></div>

  <div class="token-box" id="tokenBox">
    <strong>Your JWT (auto-applied to Swagger via cookie):</strong>
    <div id="tokenText"></div>
    <br>
    <button class="action copy" onclick="copyToken()">Copy token</button>
    <a href="/docs" target="_blank" class="action swagger">Open Swagger →</a>
    <button class="action signout" onclick="doSignOut()">Sign out (all devices)</button>
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_YWxpdmUtbWFja2VyZWwtODYuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://alive-mackerel-86.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <script>
    const statusEl = document.getElementById('statusMsg');

    function setStatus(msg, isError = false) {
      statusEl.innerText = msg;
      statusEl.className = isError ? 'status error' : 'status';
    }

    async function setBackendCookie(token) {
      // Step 1: Clear old cookie (handles account switching)
      try {
        await fetch('/api/v1/auth/clear-cookie', { method: 'POST' });
      } catch (e) {
        console.log('clear-cookie failed (ok if first login):', e);
      }

      // Step 2: Set new cookie with the current user's token
      try {
        const resp = await fetch('/api/v1/auth/set-cookie', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          credentials: 'include',
        });
        if (resp.ok) {
          const data = await resp.json();
          setStatus('✅ Logged in as ' + data.user_email + '. Swagger is auto-authenticated — no need to paste tokens!');
          return true;
        } else {
          const err = await resp.text();
          setStatus('⚠️ Cookie not set: ' + err, true);
          return false;
        }
      } catch (err) {
        setStatus('⚠️ Could not set cookie: ' + err.message, true);
        return false;
      }
    }

    window.addEventListener('load', async () => {
      await Clerk.load({
        afterSignOutUrl: '/login',
        afterSignInUrl: '/login',
        afterSignUpUrl: '/login',
      });

      if (Clerk.user) {
        const app = document.getElementById('app');
        app.innerHTML = '<div id="user-button"></div>';
        Clerk.mountUserButton(document.getElementById('user-button'));

        setStatus('Getting token from Clerk...');

        // Get a JWT from Clerk
        const token = await Clerk.session.getToken();
        if (!token) {
          setStatus('⚠️ No token from Clerk. Try signing out and back in.', true);
          return;
        }

        document.getElementById('tokenText').innerText = token;
        document.getElementById('tokenBox').style.display = 'block';

        // Set the cookie on the backend (clears old one first)
        await setBackendCookie(token);

        // Poll: refresh cookie every 30s with a fresh token
        // This handles both session expiry AND keeps the cookie fresh
        setInterval(async () => {
          try {
            const freshToken = await Clerk.session.getToken({ skipCache: true });
            if (!freshToken) {
              await doSignOut();
              return;
            }
            // Silently update cookie with fresh token
            await fetch('/api/v1/auth/set-cookie', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + freshToken },
              credentials: 'include',
            });
            // Update displayed token too
            document.getElementById('tokenText').innerText = freshToken;
          } catch (err) {
            console.log('Token refresh failed:', err);
            await Clerk.signOut();
            location.reload();
          }
        }, 3000); // every 3 seconds

      } else {
        // Not signed in — show sign-in card
        Clerk.mountSignIn(document.getElementById('app'));
        setStatus('Sign in with Google, GitHub, or email to get started.');
      }
    });

    function copyToken() {
      const text = document.getElementById('tokenText').innerText;
      navigator.clipboard.writeText(text);
      alert('Token copied!');
    }

    async function doSignOut() {
      setStatus('Signing out...');

      // Step 1: Try to revoke sessions on the backend
      try {
        await fetch('/api/v1/auth/logout', {
          method: 'POST',
          credentials: 'include',
        });
      } catch (e) {
        console.log('Backend logout failed (ok):', e);
      }

      // Step 2: Clear the cookie
      try {
        await fetch('/api/v1/auth/clear-cookie', {
          method: 'POST',
          credentials: 'include',
        });
      } catch (e) {
        console.log('Clear cookie failed (ok):', e);
      }

      // Step 3: Sign out of Clerk (clears Clerk's own cookies)
      await Clerk.signOut();
      location.reload();
    }
  </script>
</body>
</html>
