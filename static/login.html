<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpsMindAI — Sign In</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { margin-bottom: 20px; }
    #app { margin-bottom: 30px; }
    .token-box {
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      max-width: 700px;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      display: none;
    }
    button.copy {
      margin-top: 10px;
      padding: 8px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>OpsMindAI Login</h1>
  <div id="app"></div>

  <div class="token-box" id="tokenBox">
    <strong>Your JWT (paste into Swagger Authorize):</strong>
    <div id="tokenText"></div>
    <button class="copy" onclick="copyToken()">Copy token</button>
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_YWxpdmUtbWFja2VyZWwtODYuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://alive-mackerel-86.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <script>
  window.addEventListener('load', async () => {
    await Clerk.load({
      afterSignOutUrl: '/login',
      afterSignInUrl: '/login',
      afterSignUpUrl: '/login',
    });

    if (Clerk.user) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div id="user-button"></div>
        <button onclick="Clerk.signOut().then(() => location.reload())"
                style="margin-top:15px;padding:10px 20px;background:#ef4444;color:white;border:none;border-radius:6px;cursor:pointer;">
          Sign out (this device)
        </button>
      `;
      Clerk.mountUserButton(document.getElementById('user-button'));

      const token = await Clerk.session.getToken({ template: 'long-lived' });
      document.getElementById('tokenText').innerText = token;
      document.getElementById('tokenBox').style.display = 'block';

      // Poll every 3s — if the session was revoked elsewhere, sign out locally
      setInterval(async () => {
        try {
          const fresh = await Clerk.session.getToken({ skipCache: true });
          if (!fresh) {
            await Clerk.signOut();
            location.reload();
          }
        } catch (err) {
          console.log('Session ended:', err.message);
          await Clerk.signOut();
          location.reload();
        }
      }, 3000);
    } else {
      Clerk.mountSignIn(document.getElementById('app'));
    }
  });

  function copyToken() {
    const text = document.getElementById('tokenText').innerText;
    navigator.clipboard.writeText(text);
    alert('Token copied! Paste it into Swagger Authorize.');
  }
</script>
</body>
</html>
